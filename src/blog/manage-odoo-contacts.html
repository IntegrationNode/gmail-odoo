    <!-- Schema.org FAQPage -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "@id": "https://integrationnode.com/gmail-odoo/blog/manage-odoo-contacts.html#faq",
        "mainEntity": [
            {
                "@type": "Question",
                "name": "Company or individual: which should I choose in Odoo?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Odoo 19 no longer has an explicit Individual/Company switch on the form (it existed as a radio button in versions 14–18). In practice, model an organization as a top-level contact and a person by linking them to their company: create the company first, then add people as child contacts from the company's Contacts tab, so each person is attached to their organization."
                }
            },
            {
                "@type": "Question",
                "name": "How do I merge duplicate contacts in Odoo?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Open the Contacts app in list view, tick the contacts you want to merge, then open the Actions menu and choose Merge. Pick the destination contact that will be kept, review the list, and click Merge Contacts. All linked documents (orders, invoices, emails, opportunities) are reassigned to the destination contact. The route is the same in Odoo 14 through 19."
                }
            },
            {
                "@type": "Question",
                "name": "How do I save an email to a contact's record?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Odoo stores emails in the contact's chatter, but only if they are logged there. Inside Odoo you can use the chatter to send or log a message. To capture emails that live in Gmail, install Odoo Integration for Gmail: it shows the Odoo contact next to your inbox and logs the email to the contact's record in one click, without leaving Gmail."
                }
            },
            {
                "@type": "Question",
                "name": "What is the difference between a contact and a lead/opportunity?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "A contact (res.partner) is a stable record for a person or company you do business with. A lead or opportunity (in CRM) is a potential deal that moves through your sales pipeline and is usually linked to a contact. One contact can have several opportunities over time; the contact is the durable record, the opportunity is the transient sales process."
                }
            },
            {
                "@type": "Question",
                "name": "How do I import contacts without creating duplicates?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Download Odoo's import template, map the email field correctly, and use the External ID column when re-importing so existing records are updated instead of duplicated. Odoo has no single deduplication checkbox, so after a large import run the Merge tool from the Contacts list to clean up any duplicates that slipped through."
                }
            }
        ]
    }

    <!-- Language Switcher Script -->
    <script>
    (function() {
        var LANGUAGES = [
            { code: 'en', name: 'English', path: '' },
            { code: 'es', name: 'Español', path: 'es/' },
            { code: 'fr', name: 'Français', path: 'fr/' },
            { code: 'de', name: 'Deutsch', path: 'de/' },
            { code: 'it', name: 'Italiano', path: 'it/' },
            { code: 'pt', name: 'Português', path: 'pt/' },
            { code: 'nl', name: 'Nederlands', path: 'nl/' },
            { code: 'pl', name: 'Polski', path: 'pl/' }
        ];

        var dropdown = document.getElementById('lang-dropdown');
        if (!dropdown) return;

        var toggle = dropdown.querySelector('.lang-toggle');
        var menu = dropdown.querySelector('.lang-menu');
        var path = window.location.pathname;

        // Get page path relative to language root (e.g., "blog/article.html")
        var pathParts = path.split('/');
        var page = '';
        var isSubLang = false;

        for (var i = 0; i < LANGUAGES.length; i++) {
            var langPath = LANGUAGES[i].path;
            if (langPath && path.includes('/' + langPath)) {
                isSubLang = true;
                // Get everything after the language folder
                var langIndex = path.indexOf('/' + langPath);
                page = path.substring(langIndex + langPath.length + 1);
                break;
            }
        }

        if (!isSubLang) {
            // English (root) - get path after docs folder
            var docsIndex = path.indexOf('odoo-integration-gmail-docs/');
            if (docsIndex !== -1) {
                page = path.substring(docsIndex + 'odoo-integration-gmail-docs/'.length);
            } else {
                page = pathParts.slice(-2).join('/');
            }
        }

        if (!page || page === '') page = 'index.html';

        var currentLang = LANGUAGES[0];
        for (var i = 1; i < LANGUAGES.length; i++) {
            if (path.includes('/' + LANGUAGES[i].path)) {
                currentLang = LANGUAGES[i];
                break;
            }
        }

        LANGUAGES.forEach(function(lang) {
            if (lang.code === currentLang.code) return;
            var link = document.createElement('a');
            // For nested pages, we need to go up two levels from /blog/article.html
            if (currentLang.path) {
                // From /es/blog/article.html to other langs
                link.href = '../../' + lang.path + page;
            } else {
                // From /blog/article.html to other langs
                link.href = '../' + lang.path + page;
            }
            link.textContent = lang.name;
            link.setAttribute('role', 'menuitem');
            link.setAttribute('data-lang', lang.code);
            menu.appendChild(link);
        });

        toggle.addEventListener('click', function(e) {
            e.preventDefault();
            var expanded = toggle.getAttribute('aria-expanded') === 'true';
            toggle.setAttribute('aria-expanded', !expanded);
            dropdown.classList.toggle('open');
        });

        document.addEventListener('click', function(e) {
            if (!dropdown.contains(e.target)) {
                toggle.setAttribute('aria-expanded', 'false');
                dropdown.classList.remove('open');
            }
        });
    })();
    </script>
